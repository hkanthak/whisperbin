<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WhisperBin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/@picocss/pico@1.5.10/css/pico.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>

<body>
    <main class="fade-in">
        {{ template "header" . }}

        <p>You received a one-time secret.</p>

        <p>It will be shown exactly once and deleted afterwards. Make sure you are ready to read it before
            revealing.</p>

        <form action="/{{.ID}}" method="post">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <button type="submit">Reveal Secret</button>
        </form>

        <a href="/" class="back-button">Back to WhisperBin</a>

    </main>

    {{ template "footer" . }}
</body>

</html>
